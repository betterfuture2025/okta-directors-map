<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; }
  body { display: flex; flex-direction: column; background: #f4f5f7; color: #1f2937; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 18px; background: white; color: #1f2937;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); z-index: 1000;
    border-bottom: 3px solid #d62828;
  }
  .header-logo { height: 44px; display: block; }
  .header-divider { width: 1px; height: 36px; background: #e5e7eb; margin: 0 4px; }
  .title-block h1 { font-size: 15px; font-weight: 700; color: #1f2937; }
  .title-block .sub-line { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 2px; font-size: 11px; }
  .title-block .sub { color: #6b7280; }
  .title-block .sub-divider { color: #d1d5db; }
  .title-block .credit-line { color: #6b7280; }
  .title-block .credit-line strong { color: #d62828; font-weight: 700; }
  .title-block .ver-tag {
    display: inline-block; background: #fef2f2; color: #d62828;
    padding: 1px 6px; border-radius: 10px; font-size: 9px; font-weight: 700;
    margin-left: 2px; border: 1px solid #fecaca;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .lang-toggle { display: flex; background: #f3f4f6; border-radius: 6px; padding: 2px; border: 1px solid #e5e7eb; }
  .lang-toggle button {
    border: none; background: transparent; color: #6b7280; padding: 5px 9px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }
  .lang-toggle button.active { background: #d62828; color: white; }

  main { flex: 1; display: flex; overflow: hidden; position: relative; }

  aside { width: 340px; background: white; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow: hidden; }
  .search-box { padding: 12px; border-bottom: 1px solid #e5e7eb; }
  .search-box input {
    width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px;
    font-size: 13px; outline: none;
  }
  .search-box input:focus { border-color: #d62828; box-shadow: 0 0 0 3px rgba(214,40,40,.12); }
  .filter-row { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
  .filter-chip {
    padding: 4px 10px; border-radius: 12px; background: #f3f4f6;
    font-size: 11px; cursor: pointer; border: 1px solid transparent;
    user-select: none; white-space: nowrap;
  }
  .filter-chip.active { background: #d62828; color: white; }
  .filter-chip:hover:not(.active) { background: #e5e7eb; }

  .tabs { display: flex; border-bottom: 1px solid #e5e7eb; background: #f9fafb; }
  .tab {
    flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600;
    cursor: pointer; color: #6b7280; border-bottom: 2px solid transparent;
  }
  .tab.active { color: #d62828; border-bottom-color: #d62828; background: white; }
  .tab-content { flex: 1; overflow-y: auto; }

  .city-group { border-bottom: 1px solid #f3f4f6; }
  .city-header {
    padding: 9px 12px; background: #f9fafb; font-size: 12px; font-weight: 600;
    color: #374151; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; user-select: none;
  }
  .city-header:hover { background: #f3f4f6; }
  .city-name { display: flex; align-items: center; gap: 8px; }
  .city-flag { font-size: 18px; line-height: 1; }
  .city-count {
    background: #e5e7eb; color: #374151; padding: 1px 7px; border-radius: 9px;
    font-size: 10px; font-weight: 600;
  }
  .person-item {
    padding: 7px 14px 7px 28px; font-size: 13px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #f9fafb;
  }
  .person-item:hover { background: #fef2f2; }
  .person-name { font-weight: 500; }
  .role-badge {
    background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600;
  }
  .board-badge {
    background: linear-gradient(135deg, #d62828, #9d1c1c); color: white;
    padding: 2px 7px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: .2px;
    white-space: nowrap;
  }
  .exec-badge {
    background: linear-gradient(135deg, #2563eb, #1e40af); color: white;
    padding: 2px 7px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: .2px;
    white-space: nowrap;
  }
  .honorary-badge {
    background: linear-gradient(135deg, #fbbf24, #b45309); color: white;
    padding: 2px 7px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: .2px;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(180, 83, 9, 0.25);
  }
  .auditor-badge {
    background: linear-gradient(135deg, #1f2937, #000000); color: white;
    padding: 2px 7px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: .3px;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }
  .person-item.is-honorary { background: linear-gradient(90deg, #fffbeb, transparent); }
  .person-item.is-honorary .person-name { font-weight: 700; color: #92400e; }
  .person-item.is-auditor { background: linear-gradient(90deg, #f3f4f6, transparent); }
  .person-item.is-auditor .person-name { font-weight: 700; color: #1f2937; }
  .person-item.is-board { background: linear-gradient(90deg, #fff7ed, transparent); }
  .person-item.is-board .person-name { font-weight: 700; color: #9d1c1c; }
  .person-item.is-exec { background: linear-gradient(90deg, #eff6ff, transparent); }
  .person-item.is-exec .person-name { font-weight: 700; color: #1e3a8a; }

  .dash { padding: 12px; }
  .stat-card {
    background: linear-gradient(135deg, #d62828 0%, #9d1c1c 100%);
    color: white; padding: 14px; border-radius: 8px; margin-bottom: 10px;
    display: flex; justify-content: space-around; text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 10px; opacity: .9; margin-top: 2px; }
  .bar-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; cursor: pointer; }
  .bar-row:hover .bar-label { color: #d62828; }
  .bar-label { width: 100px; flex-shrink: 0; color: #374151; }
  .bar-track { flex: 1; height: 18px; background: #f3f4f6; border-radius: 4px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #f4a826, #d62828); transition: width .4s ease; }
  .bar-num {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-size: 11px; font-weight: 600; color: #1f2937;
  }

  #map { flex: 1; }

  /* Custom proportional markers */
  .agg-marker {
    border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: white;
    font-weight: 700; border: 3px solid white;
    box-shadow: 0 3px 12px rgba(0,0,0,.35); cursor: pointer;
    line-height: 1; text-align: center;
  }
  .agg-marker .lbl { 
    font-size: 9px; font-weight: 500; opacity: .92; margin-top: 2px;
    max-width: 95%; padding: 0 3px; line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: clip;
  }
  /* Tier base — colors injected per-marker by region */
  .agg-marker.no-leader-tint { opacity: .85; }

  .leaflet-popup-content { margin: 10px 12px; font-size: 12px; min-width: 220px; }
  .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-meta { font-size: 11px; color: #6b7280; margin-bottom: 8px; }
  .popup-list { max-height: 240px; overflow-y: auto; }
  .popup-person { padding: 4px 0; border-top: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; }
  .popup-person:first-child { border-top: none; }
  .popup-action {
    margin-top: 8px; padding: 6px 10px; background: #d62828; color: white;
    border: none; border-radius: 5px; font-size: 11px; cursor: pointer;
    width: 100%; font-weight: 600;
  }
  .popup-action:hover { background: #b91c1c; }
  .popup-breakdown {
    max-height: 200px; overflow-y: auto; margin-top: 8px;
    border-top: 1px solid #f3f4f6; padding-top: 6px;
  }
  .popup-breakdown-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; font-size: 12px;
  }
  .popup-breakdown-name { color: #374151; display: flex; align-items: center; gap: 6px; }
  .popup-breakdown-name .flag { font-size: 15px; line-height: 1; }
  .popup-breakdown-count { color: #6b7280; font-weight: 600; }

  /* Legend */
  .legend {
    position: absolute; bottom: 18px; left: 18px; z-index: 500;
    background: white; padding: 10px 12px; border-radius: 8px;
    box-shadow: 0 2px 10px rgba(0,0,0,.15); font-size: 11px;
    max-width: 220px;
  }
  
  .legend-title { font-weight: 700; font-size: 11px; margin-bottom: 6px; color: #1f2937; }
  .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; color: #4b5563; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 3px rgba(0,0,0,.3); flex-shrink: 0; }

  /* Zoom level indicator */
  .zoom-indicator {
    position: absolute; top: 14px; right: 14px; z-index: 500;
    background: white; padding: 6px 12px; border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); font-size: 11px;
    font-weight: 600; color: #d62828;
    border: 2px solid #d62828;
  }

  @media (max-width: 768px) {
    aside { position: absolute; left: 0; top: 0; bottom: 0; z-index: 999;
      transform: translateX(-100%); transition: transform .3s; width: 88%; max-width: 360px;
      box-shadow: 4px 0 16px rgba(0,0,0,.15); }
    aside.open { transform: translateX(0); }
    .menu-btn { display: block; background: #f3f4f6; border: 1px solid #e5e7eb;
      color: #1f2937; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 16px;
      min-width: 40px; min-height: 40px; }
    .title-block h1 { font-size: 13px; }
    .title-block .sub-line { font-size: 10px; gap: 4px; }
    .title-block .sub-divider { display: none; }
    .title-block .ver-tag { font-size: 8px; padding: 1px 4px; }
    .header-logo { height: 32px; }
    .header-divider { display: none; }
    .legend { font-size: 10px; padding: 8px; max-width: 160px; bottom: 12px; left: 12px; }
    .credit-badge { top: 10px; left: 50px; font-size: 9px; padding: 4px 9px; }
    .zoom-indicator { font-size: 10px; padding: 5px 9px; top: 10px; right: 10px; }
    .lang-toggle button { padding: 6px 7px; font-size: 10px; min-height: 32px; }
    /* Bigger touch targets */
    .filter-chip { padding: 7px 12px; font-size: 12px; min-height: 32px; display: flex; align-items: center; }
    .tab { padding: 12px 8px; min-height: 44px; }
    .person-item { padding: 10px 14px 10px 28px; min-height: 36px; }
    /* Sidebar overlay backdrop */
    aside.open ~ #map::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.4); z-index: 998;
    }
  }
  @media (min-width: 769px) { .menu-btn { display: none; } }
  @media (max-width: 520px) {
    .header-logo { display: none; }
    .title-block h1 { font-size: 13px; }
    .title-block .sub-line { font-size: 9px; }
    .title-block .credit-line { display: none; }
    .lang-toggle button { padding: 5px 6px; font-size: 9px; }
  }
  @media (max-width: 380px) {
    header { padding: 6px 10px; }
    .lang-toggle { padding: 1px; }
    .lang-toggle button { padding: 4px 5px; font-size: 9px; }
    .title-block h1 { font-size: 12px; }
    .title-block .sub { font-size: 8.5px; }
  }

  .loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: white; padding: 16px 24px; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15); z-index: 5000; font-size: 13px;
  }
</style>
</head>

const regionLabel = r => lang === 'ko' ? r : (REGION_TR[r] && REGION_TR[r][lang]) || r;

// Board role short label
function boardLabel(role) {
  if (!role) return '';

    return ({ko:'이사장', en:'Chairman', zh:'理事长', ja:'理事長'})[lang];

  }
  // Regional director: extract region prefix
  // role format: "북미주서부 지역이사장"
  const idx = role.indexOf(' 지역이사장');
  if (idx > 0) {
    const region = role.substring(0, idx);
    const regionTr = lang === 'ko' ? region : (REGION_TR[region] && REGION_TR[region][lang]) || region;
    const dirLabel = ({ko:'지역이사장', en:'Director', zh:'理事长', ja:'理事長'})[lang];
    return `${regionTr} ${dirLabel}`;
  }
  return role;
}

function execLabel(role) {
  if (!role) return '';
  // role formats:
  //   '회장' / '수석부회장'
  //   '<X> 부회장' (e.g. '정책기획 부회장')
  //   '<region> 지역회장'

  //   중·동부유럽, 유라시아, 중동, 아프리카, 중미, 남미, 동남아, 서남아,
  //   중국화북, 중국동북, 중국화동, 중국화남, 일본동부, 일본서부
  const TR_REGION = {
    '미국동북부':   {en:'US Northeast', zh:'美国东北', ja:'米国東北'},
    '미국동남부':   {en:'US Southeast', zh:'美国东南', ja:'米国東南'},
    '미국서부':     {en:'US West',      zh:'美国西部', ja:'米国西部'},
    '캐나다':       {en:'Canada',       zh:'加拿大',   ja:'カナダ'},
    '대양주':       {en:'Oceania',      zh:'大洋洲',   ja:'オセアニア'},
    '서유럽':       {en:'W. Europe',    zh:'西欧',     ja:'西欧'},
    '중·동부유럽':  {en:'C&E Europe',   zh:'中东欧',   ja:'中東欧'},
    '유라시아':     {en:'Eurasia',      zh:'欧亚',     ja:'ユーラシア'},
    '중동':         {en:'Middle East',  zh:'中东',     ja:'中東'},
    '아프리카':     {en:'Africa',       zh:'非洲',     ja:'アフリカ'},
    '중미':         {en:'C. America',   zh:'中美',     ja:'中米'},
    '남미':         {en:'S. America',   zh:'南美',     ja:'南米'},
    '동남아':       {en:'SE Asia',      zh:'东南亚',   ja:'東南アジア'},
    '서남아':       {en:'SW Asia',      zh:'西南亚',   ja:'西南アジア'},
    '중국화북':     {en:'China North',  zh:'中国华北', ja:'中国華北'},
    '중국동북':     {en:'China NE',     zh:'中国东北', ja:'中国東北'},
    '중국화동':     {en:'China East',   zh:'中国华东', ja:'中国華東'},
    '중국화남':     {en:'China South',  zh:'中国华南', ja:'中国華南'},
    '일본동부':     {en:'Japan East',   zh:'日本东部', ja:'日本東部'},
    '일본서부':     {en:'Japan West',   zh:'日本西部', ja:'日本西部'}
  };
  
  function tr(map, key) {
    if (lang === 'ko') return key;
    return (map[key] && map[key][lang]) || key;
  }
  
  if (role === '회장' || role === '수석부회장') {
    return TR_TITLE[role][lang] || role;
  }
  
  // Pattern: "<dept> 부회장"
  const vpMatch = role.match(/^(.+?)\s*부회장$/);
  if (vpMatch) {
    const dept = vpMatch[1];

  // Pattern: "<region> 지역회장"
  const rpMatch = role.match(/^(.+?)\s*지역회장$/);

  }
  
  return role;
}

const ISO = {"Argentina":"ar","Brazil":"br","Chile":"cl","Paraguay":"py","Peru":"pe","Australia":"au","New Zealand":"nz","Cambodia":"kh","Hong Kong":"hk","Laos":"la","Philippines":"ph","Taiwan":"tw","Thailand":"th","USA":"us","Guam":"gu","Vietnam":"vn","Bangladesh":"bd","India":"in","Indonesia":"id","Malaysia":"my","Myanmar":"mm","Singapore":"sg","Belgium":"be","France":"fr","Germany":"de","Italy":"it","Norway":"no","Spain":"es","Sweden":"se","Switzerland":"ch","UK":"gb","Egypt":"eg","Kenya":"ke","Malawi":"mw","Morocco":"ma","South Africa":"za","Tanzania":"tz","Kazakhstan":"kz","Kyrgyzstan":"kg","Russia":"ru","Tajikistan":"tj","Uzbekistan":"uz","Japan":"jp","Austria":"at","Bulgaria":"bg","Czech Republic":"cz","Hungary":"hu","Poland":"pl","Slovakia":"sk","Turkiye":"tr","Ukraine":"ua","China":"cn","Bahrain":"bh","Oman":"om","Saudi Arabia":"sa","United Arab Emirates":"ae","Dominican Republic":"do","Mexico":"mx","Panama":"pa","Costa Rica":"cr","Canada":"ca"};
// SVG flag from flagcdn.com — graceful fallback to country code text on load failure
function flagFallback(img, code, w) {
  const span = document.createElement('span');
  span.textContent = code.toUpperCase();
  span.style.cssText = 'display:inline-block;font-size:' + Math.max(8, Math.round(w*0.5)) + 'px;font-weight:700;color:#374151;background:#f3f4f6;border:1px solid #d1d5db;border-radius:2px;padding:1px 4px;line-height:1;vertical-align:middle;';
  if (img && img.parentNode) img.parentNode.replaceChild(span, img);
}
function flagOf(country, size) {
  const code = ISO[country];
  if (!code) return '<span style="display:inline-block;width:1.2em;height:.85em;background:#ccc;border-radius:1px;"></span>';
  const w = size || 18;
  const h = Math.round(w * 0.75);
  return '<img src="https://flagcdn.com/w40/' + code + '.png" srcset="https://flagcdn.com/w80/' + code + '.png 2x" width="' + w + '" height="' + h + '" alt="' + country + '" title="' + country + '" style="display:inline-block;vertical-align:middle;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.1);object-fit:cover;" onerror="flagFallback(this,\'' + code + '\',' + w + ')">';
}

// === Filter logic === //
function filterPeople() {
  const q = searchQuery.trim().toLowerCase();
  return PEOPLE.filter(p => {
    if (activeFilter === 'leader' && p.role !== '지회장') return false;
    if (activeFilter === 'board' && !p.boardRole) return false;
    if (activeFilter === 'exec' && !p.execRole) return false;
    if (activeFilter === 'auditor' && !p.auditorRole) return false;
    if (activeRegion && p.region !== activeRegion) return false;
    if (q) {
      const hay = `${p.name} ${p.country} ${p.city} ${p.region} ${p.continent} ${p.boardRole||''} ${p.execRole||''} ${p.honoraryRole||''} ${p.auditorRole||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// === Proportional sizing === //
// Use sqrt scale (area proportional to count) — visually fair
function sizeForCount(n, tier) {
  // Tier-specific min/max sizes
  const config = {
    region: { min: 50, max: 100, ref: 120 },   // 119 = max (중국)
    country: { min: 30, max: 78, ref: 100 },   // ~99 = USA
    city: { min: 22, max: 64, ref: 50 }        // 48 = LA max
  }[tier];
  // Sqrt scale
  const ratio = Math.sqrt(n / config.ref);
  return Math.max(config.min, Math.min(config.max, config.min + (config.max - config.min) * ratio));
}

// === Aggregate by tier === //
function aggregateByRegion(people) {
  const out = {};
  // Helper: treat Guam separately from USA mainland for display purposes
  const displayCountry = p => (p.country === 'USA' && p.city === 'Guam') ? 'Guam' : p.country;
  for (const p of people) {
    if (!out[p.region]) {
      const c = REGION_CENTERS[p.region];
      out[p.region] = {
        key: p.region, name: p.region, type: 'region',
        lat: c.lat, lng: c.lng, people: [], countries: new Set(), cities: new Set()
      };
    }
    out[p.region].people.push(p);
    out[p.region].countries.add(displayCountry(p));
    out[p.region].cities.add(p.country + '|' + p.city);
  }
  return Object.values(out);
}

function aggregateByCountry(people) {
  const out = {};
  for (const p of people) {
    // Special case: Guam is geographically/politically USA but belongs to Asia region.
    // Display it as a separate country marker so USA mainland count excludes it.
    let key, displayName, lat, lng;
    if (p.country === 'USA' && p.city === 'Guam') {
      key = 'Guam';
      displayName = 'Guam';
      lat = p.lat; lng = p.lng;
    } else {
      key = p.country;
      displayName = p.country;
      const c = COUNTRY_CENTERS[p.country];
      lat = c.lat; lng = c.lng;
    }
    if (!out[key]) {
      out[key] = {
        key: key, name: displayName, type: 'country',
        region: p.region, lat: lat, lng: lng, people: [], cities: new Set()
      };
    }
    out[key].people.push(p);
    out[key].cities.add(p.city);
  }
  return Object.values(out);
}

function aggregateByCity(people) {
  const out = {};
  for (const p of people) {
    const k = p.country + '|' + p.city;
    if (!out[k]) {
      out[k] = {
        key: k, name: p.city, country: p.country, type: 'city',
        region: p.region, lat: p.lat, lng: p.lng, people: []
      };
    }
    out[k].people.push(p);
  }
  for (const k in out) {
    out[k].people.sort((a,b) => {
      if (a.role && !b.role) return -1;
      if (!a.role && b.role) return 1;
      return a.name.localeCompare(b.name, 'ko');
    });
  }
  return Object.values(out);
}

// === Determine tier based on zoom === //
function getTierFromZoom(z) {
  if (z <= 3) return 'region';
  if (z <= 5) return 'country';
  return 'city';
}

// === Render markers for current tier === //
function renderMarkers() {
  if (markerLayer) map.removeLayer(markerLayer);
  markerLayer = L.layerGroup();

  const filtered = filterPeople();
  const tier = currentTier;
  let groups;
  if (tier === 'region') groups = aggregateByRegion(filtered);
  else if (tier === 'country') groups = aggregateByCountry(filtered);
  else groups = aggregateByCity(filtered);

  for (const g of groups) {
    const n = g.people.length;
    const size = sizeForCount(n, tier);
    const hasLeader = g.people.some(p => p.role === '지회장');

    // Get region color for this marker
    let regionKey;
    if (tier === 'region') regionKey = g.name;
    else if (tier === 'country') regionKey = g.region;
    else regionKey = g.region;
    const rc = REGION_COLORS[regionKey] || { main: '#6b7280', dark: '#374151' };
    const bg = `linear-gradient(135deg, ${rc.dark}, ${rc.main})`;

    let inner;
    if (tier === 'region') {
      const numSize = Math.max(15, size*0.32);
      const lblSize = Math.max(9, size*0.14);
      inner = `<div class="agg-marker" style="background:${bg};width:${size}px;height:${size}px;">
        <div style="font-size:${numSize}px;font-weight:700;line-height:1;">${n}</div>
        <div class="lbl" style="font-size:${lblSize}px;line-height:1;margin-top:2px;">${regionLabel(g.name)}</div>
      </div>`;
    } else if (tier === 'country') {
      const numSize = Math.max(13, size*0.45);
      inner = `<div class="agg-marker" style="background:${bg};width:${size}px;height:${size}px;font-size:${numSize}px;">${n}</div>`;
    } else {
      // City tier: faded if no leader, full if has leader
      const opacity = hasLeader ? '1' : '0.72';
      const ringColor = hasLeader ? '#ffffff' : 'rgba(255,255,255,.6)';
      const numSize = Math.max(11, size*0.45);
      inner = `<div class="agg-marker" style="background:${bg};opacity:${opacity};border-color:${ringColor};width:${size}px;height:${size}px;font-size:${numSize}px;">${n}</div>`;
    }

    const icon = L.divIcon({
      className: '', html: inner,
      iconSize: [size, size], iconAnchor: [size/2, size/2]
    });
    const marker = L.marker([g.lat, g.lng], { icon });
    marker.bindPopup(buildPopup(g, tier));
    marker.on('click', () => {
      // Drill down on click for region/country
      if (tier === 'region') {
        zoomToBounds(g.people, 4);
      } else if (tier === 'country') {
        zoomToBounds(g.people, 6);
      }
    });
    marker.aggKey = g.key;
    marker.aggData = g;
    markerLayer.addLayer(marker);
  }
  markerLayer.addTo(map);

  // Update zoom indicator
  const ind = document.getElementById('zoomIndicator');
  const tt = I18N[lang];
  ind.textContent = tier === 'region' ? tt.tabRegion : tier === 'country' ? tt.tabCountry : tt.tabCity;
}

function zoomToBounds(people, targetZoom) {
  if (!people.length) return;
  const lats = people.map(p => p.lat), lngs = people.map(p => p.lng);
  const bounds = L.latLngBounds([Math.min(...lats), Math.min(...lngs)], [Math.max(...lats), Math.max(...lngs)]);
  if (bounds.isValid()) {
    map.flyToBounds(bounds.pad(0.3), { maxZoom: targetZoom, duration: 0.7 });
  }
}

function buildPopup(g, tier) {
  const t = I18N[lang];
  const n = g.people.length;
  const leaderCount = g.people.filter(p => p.role === '지회장').length;

  if (tier === 'region') {
    const byCountry = {};
    g.people.forEach(p => {
      const dc = (p.country === 'USA' && p.city === 'Guam') ? 'Guam' : p.country;
      byCountry[dc] = (byCountry[dc] || 0) + 1;
    });
    const sorted = Object.entries(byCountry).sort((a,b) => b[1] - a[1]);
    // Find regional director for this region
    const regDirector = g.people.find(p => p.boardRole && p.boardRole.includes('지역이사장'));
    const rc = REGION_COLORS[g.name] || { main: '#d62828', dark: '#991b1b' };
    let html = `<div class="popup-title" style="color:${rc.dark};">${regionLabel(g.name)}</div>`;
    // Show flags of all countries in this region
    const flagList = [...g.countries].map(c => `<span title="${c}" style="margin-right:3px;">${flagOf(c, 20)}</span>`).join('');
    html += `<div style="margin:6px 0;line-height:1.4;">${flagList}</div>`;
    html += `<div class="popup-meta">${n}${t.members} · ${g.countries.size} ${t.countries2} · ${g.cities.size} ${t.cities2} · ${leaderCount} ${t.leaders}</div>`;
    if (regDirector) {
      html += `<div style="margin-top:6px;padding:6px 8px;background:linear-gradient(90deg,#fff7ed,#fef3c7);border-left:3px solid #d62828;border-radius:3px;font-size:11px;">
        <span style="font-weight:700;color:#9d1c1c;">${t.regDirector}:</span>
        <span style="font-weight:600;">${regDirector.name}</span>
        <span style="color:#6b7280;display:inline-flex;align-items:center;gap:4px;"> (${flagOf(regDirector.country, 18)} ${regDirector.city})</span>
      </div>`;
    }
    html += `<div style="font-size:11px;font-weight:600;color:#374151;margin-top:6px;">${t.breakdownCountry}</div>`;
    html += `<div class="popup-breakdown">`;
    for (const [c, cnt] of sorted) {
      html += `<div class="popup-breakdown-row"><span class="popup-breakdown-name">${flagOf(c, 20)}<span>${c}</span></span><span class="popup-breakdown-count">${cnt}</span></div>`;
    }
    html += `</div>`;
    return html;
  }

  if (tier === 'country') {
    const byCity = {};
    g.people.forEach(p => byCity[p.city] = (byCity[p.city] || 0) + 1);
    const sorted = Object.entries(byCity).sort((a,b) => b[1] - a[1]);
    const rc = REGION_COLORS[g.region] || { main: '#d62828', dark: '#991b1b' };
    let html = `<div class="popup-title" style="color:${rc.dark};display:flex;align-items:center;gap:8px;">${flagOf(g.name, 28)}<span>${g.name}</span></div>`;
    html += `<div class="popup-meta" style="color:${rc.main};font-weight:600;">${regionLabel(g.region)}</div>`;
    html += `<div class="popup-meta">${n}${t.members} · ${g.cities.size} ${t.cities2} · ${leaderCount} ${t.leaders}</div>`;
    html += `<div style="font-size:11px;font-weight:600;color:#374151;margin-top:6px;">${t.breakdownCity}</div>`;
    html += `<div class="popup-breakdown">`;
    for (const [c, cnt] of sorted) {
      html += `<div class="popup-breakdown-row"><span class="popup-breakdown-name">${c}</span><span class="popup-breakdown-count">${cnt}</span></div>`;
    }
    html += `</div>`;
    return html;
  }

  // city tier
  const rc = REGION_COLORS[g.region] || { main: '#d62828', dark: '#991b1b' };
  let html = `<div class="popup-title" style="color:${rc.dark};display:flex;align-items:center;gap:8px;">${flagOf(g.country, 26)}<span>${g.name}, ${g.country}</span></div>`;
  html += `<div class="popup-meta" style="color:${rc.main};font-weight:600;">${regionLabel(g.region)}</div>`;
  html += `<div class="popup-meta">${n}${t.members}</div>`;
  html += `<div class="popup-list">`;
  for (const p of g.people) {
    html += `<div class="popup-person"><span>${p.name}</span>`;
    html += `<span style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">`;
    if (p.honoraryRole) html += `<span class="honorary-badge" title="${p.honoraryRole}">${honoraryLabel(p.honoraryRole)}</span>`;
    if (p.boardRole) html += `<span class="board-badge" title="${p.boardRole}">${boardLabel(p.boardRole)}</span>`;
    if (p.execRole) html += `<span class="exec-badge" title="${p.execRole}">${execLabel(p.execRole)}</span>`;
    if (p.auditorRole) html += `<span class="auditor-badge" title="${p.auditorRole}">${auditorLabel(p.auditorRole)}</span>`;
    if (p.role === '지회장') html += `<span class="role-badge">${t.leader}</span>`;
    html += `</span>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

// === Sidebar list (always shows city-level) === //
function renderList() {
  const container = document.getElementById('tabContent');
  const filtered = filterPeople();
  if (filtered.length === 0) {
    container.innerHTML = `<div style="padding:30px;text-align:center;color:#9ca3af;font-size:13px;">${I18N[lang].noResults}</div>`;
    return;
  }
  const groups = aggregateByCity(filtered);
  groups.sort((a,b) => {
    if (a.region !== b.region) return a.region.localeCompare(b.region, 'ko');
    if (a.country !== b.country) return a.country.localeCompare(b.country);
    return a.name.localeCompare(b.name);
  });

  let html = '';
  for (const g of groups) {
    const rc = REGION_COLORS[g.region] || { main: '#6b7280', light: '#f3f4f6' };
    html += `<div class="city-group" style="border-left:3px solid ${rc.main};">`;
    html += `<div class="city-header" data-key="${g.key}">`;
    html += `<div class="city-name">${flagOf(g.country, 22)}<span><strong>${g.name}</strong>, ${g.country}</span></div>`;
    html += `<span class="city-count" style="background:${rc.light};color:${rc.dark||rc.main};">${g.people.length}</span>`;
    html += `</div>`;
    for (const p of g.people) {
      let cls = '';
      // Priority: honorary > board > exec > auditor for highlight class
      if (p.honoraryRole) cls = ' is-honorary';
      else if (p.boardRole) cls = ' is-board';
      else if (p.execRole) cls = ' is-exec';
      else if (p.auditorRole) cls = ' is-auditor';
      html += `<div class="person-item${cls}" data-key="${g.key}" data-lat="${g.lat}" data-lng="${g.lng}">`;
      html += `<span class="person-name">${p.name}</span>`;
      html += `<span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">`;
      if (p.honoraryRole) html += `<span class="honorary-badge" title="${p.honoraryRole}">${honoraryLabel(p.honoraryRole)}</span>`;
      if (p.boardRole) html += `<span class="board-badge" title="${p.boardRole}">${boardLabel(p.boardRole)}</span>`;
      if (p.execRole) html += `<span class="exec-badge" title="${p.execRole}">${execLabel(p.execRole)}</span>`;
      if (p.auditorRole) html += `<span class="auditor-badge" title="${p.auditorRole}">${auditorLabel(p.auditorRole)}</span>`;
      if (p.role === '지회장') html += `<span class="role-badge">${I18N[lang].leader}</span>`;
      html += `</span>`;
      html += `</div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.city-header, .person-item').forEach(el => {
    el.addEventListener('click', () => focusCity(el.dataset.key));
  });
}

// === Dashboard === //
function renderDash() {
  const container = document.getElementById('tabContent');
  const filtered = filterPeople();
  const t = I18N[lang];
  const totalLeaders = filtered.filter(p => p.role === '지회장').length;
  const countries = new Set(filtered.map(p => p.country)).size;
  const cities = new Set(filtered.map(p => p.country + '|' + p.city)).size;

  let html = `<div class="dash">`;
  html += `<div class="stat-card">
    <div><div class="stat-num">${filtered.length}</div><div class="stat-label">${t.total}</div></div>
    <div><div class="stat-num">${countries}</div><div class="stat-label">${t.countries}</div></div>
    <div><div class="stat-num">${cities}</div><div class="stat-label">${t.cities}</div></div>
    <div><div class="stat-num">${totalLeaders}</div><div class="stat-label">${t.leaders}</div></div>
  </div>`;

  // Always compute region breakdown for ALL 9 regions, never filtered
  // The filter narrows what's "highlighted" via `filtered` count, but ALL regions stay visible
  const byRegFiltered = {};
  filtered.forEach(p => byRegFiltered[p.region] = (byRegFiltered[p.region] || 0) + 1);
  const byRegTotal = {};
  PEOPLE.forEach(p => byRegTotal[p.region] = (byRegTotal[p.region] || 0) + 1);

  // Use a fixed canonical order — biggest first based on TOTAL counts (so it stays consistent regardless of filter)
  const REGION_ORDER = Object.entries(byRegTotal).sort((a,b) => b[1] - a[1]).map(x => x[0]);
  const maxTotal = REGION_ORDER.length ? byRegTotal[REGION_ORDER[0]] : 1;

  // Show "filtered count / total count" when a filter is active
  const isFiltered = activeFilter !== 'all' || activeRegion;

  html += `<div style="font-size:12px;font-weight:600;color:#374151;margin-top:14px;margin-bottom:3px;">${t.byRegion}</div>`;
  html += `<div style="font-size:10px;color:#9ca3af;margin-bottom:8px;line-height:1.4;">ℹ️ ${t.regionGuide}</div>`;
  for (const r of REGION_ORDER) {
    const nFiltered = byRegFiltered[r] || 0;
    const nTotal = byRegTotal[r];
    // Bar width is based on TOTAL so the bar layout stays stable
    const pctTotal = (nTotal / maxTotal * 100).toFixed(1);
    const pctFiltered = (nFiltered / maxTotal * 100).toFixed(1);
    const isActive = activeRegion === r;
    const rc = REGION_COLORS[r] || { main: '#6b7280', dark: '#374151', light: '#f3f4f6' };
    const activeBg = isActive ? `background:${rc.light};border-radius:4px;padding:5px 4px;` : '';
    html += `<div class="bar-row" data-reg="${r}" style="${activeBg}">`;
    html += `<div class="bar-label" style="color:${isActive?rc.dark:'#374151'};font-weight:${isActive?'700':'400'};">${regionLabel(r)}</div>`;
    if (isFiltered) {
      // Show light bar for total + colored bar for filtered subset, with "X / Y" count
      html += `<div class="bar-track">
        <div class="bar-fill" style="width:${pctTotal}%;background:#e5e7eb;"></div>
        <div class="bar-fill" style="width:${pctFiltered}%;background:linear-gradient(90deg, ${rc.main}, ${rc.dark});position:absolute;top:0;left:0;"></div>
        <div class="bar-num"><span style="color:${rc.dark};font-weight:700;">${nFiltered}</span><span style="color:#9ca3af;font-weight:400;">/${nTotal}</span></div>
      </div>`;
    } else {
      html += `<div class="bar-track"><div class="bar-fill" style="width:${pctTotal}%;background:linear-gradient(90deg, ${rc.main}, ${rc.dark});"></div><div class="bar-num">${nTotal}</div></div>`;
    }
    html += `</div>`;
  }

  if (activeRegion) {
    html += `<div style="margin-top:10px;padding:8px;background:#fef3c7;border-radius:6px;font-size:11px;color:#92400e;cursor:pointer;text-align:center;" id="resetReg">
      ${t.filterActive(regionLabel(activeRegion))}
    </div>`;
  }
  html += `</div>`;
  container.innerHTML = html;

  container.querySelectorAll('.bar-row').forEach(el => {
    el.addEventListener('click', () => {
      activeRegion = activeRegion === el.dataset.reg ? null : el.dataset.reg;
      // Zoom to region
      if (activeRegion) {
        const c = REGION_CENTERS[activeRegion];
        map.flyTo([c.lat, c.lng], 4, { duration: 0.7 });
      }
      refresh();
    });
  });
  const resetBtn = document.getElementById('resetReg');
  if (resetBtn) resetBtn.addEventListener('click', () => { activeRegion = null; refresh(); });
}

// === Focus city === //
function focusCity(key) {
  const [country, city] = key.split('|');
  const person = PEOPLE.find(p => p.country === country && p.city === city);
  if (!person) return;
  map.flyTo([person.lat, person.lng], 8, { duration: 0.7 });
  setTimeout(() => {
    if (markerLayer) {
      markerLayer.eachLayer(m => {
        if (m.aggKey === key) m.openPopup();
      });
    }
  }, 800);
  if (window.innerWidth < 769) document.getElementById('sidebar').classList.remove('open');
}

// === Refresh === //
function refresh() {
  renderMarkers();
  if (activeTab === 'list') renderList(); else renderDash();
  renderLegend();
}

// === Legend === //
function renderLegend() {
  const t = I18N[lang];
  const tier = currentTier;
  let html = `<div class="legend-title">${t.legendTitle} · `;
  html += tier === 'region' ? t.tierRegion : tier === 'country' ? t.tierCountry : t.tierCity;
  html += `</div>`;

  // Always show all 9 regions with their colors
  const regionOrder = ['북미주서부','북미주동부','중남미','중국','일본','아시아','대양주','중동·아프리카','유럽·유라시아'];
  for (const r of regionOrder) {
    const rc = REGION_COLORS[r];
    if (!rc) continue;
    const isActive = activeRegion === r;
    html += `<div class="legend-row" data-reg="${r}" style="cursor:pointer;${isActive?'font-weight:700;':''}">`;
    html += `<div class="legend-dot" style="background:linear-gradient(135deg,${rc.dark},${rc.main});"></div>`;
    html += `<span style="${isActive?`color:${rc.dark};`:''}">${regionLabel(r)}</span>`;
    html += `</div>`;
  }

  if (tier === 'city') {
    html += `<div style="margin-top:5px;padding-top:5px;border-top:1px solid #f3f4f6;font-size:10px;color:#6b7280;">`;
    html += t.solidNote;
    html += `</div>`;
  }
  html += `<div style="margin-top:5px;padding-top:5px;border-top:1px solid #f3f4f6;color:#9ca3af;font-size:10px;">`;
  html += t.sizeNote;
  html += `</div>`;
  document.getElementById('legend').innerHTML = html;

  // Bind clicks to filter by region
  document.querySelectorAll('#legend .legend-row[data-reg]').forEach(el => {
    el.addEventListener('click', () => {
      activeRegion = activeRegion === el.dataset.reg ? null : el.dataset.reg;
      if (activeRegion) {
        const c = REGION_CENTERS[activeRegion];
        if (c) map.flyTo([c.lat, c.lng], 4, { duration: 0.7 });
      }
      refresh();
    });
  });
}

// === Apply language === //
function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko]').forEach(el => {
    const v = el.dataset[lang] || el.dataset.ko;
    if (v) el.textContent = v;
  });
  document.querySelectorAll('[data-ko-ph]').forEach(el => {
    const phKey = lang + 'Ph';
    el.placeholder = el.dataset[phKey] || el.dataset.koPh;
  });
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  refresh();
}

// === Init === //
function init() {
  map = L.map('map', { worldCopyJump: true, minZoom: 2, maxZoom: 12 }).setView([25, 30], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 18
  }).addTo(map);

  // Zoom event → update tier
  map.on('zoomend', () => {
    const newTier = getTierFromZoom(map.getZoom());
    if (newTier !== currentTier) {
      currentTier = newTier;
      renderMarkers();
      renderLegend();
    }
  });

  // Lang
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    b.addEventListener('click', () => { lang = b.dataset.lang; applyLang(); });
  });

  // Search
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchQuery = e.target.value;
    searchTimer = setTimeout(refresh, 200);
  });

  // Filters
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      refresh();
    });
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      refresh();
    });
  });

  // Mobile
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });
  document.getElementById('map').addEventListener('click', () => {
    if (window.innerWidth < 769) document.getElementById('sidebar').classList.remove('open');
  });

  refresh();
  document.getElementById('loading').style.display = 'none';
}

function startApp() {
  if (typeof L === 'undefined') {
    window.__pendingInit = startApp;
    return;
  }
  init();
}
document.addEventListener('DOMContentLoaded', function() {
  if (window.__leafletReady) startApp();
  else window.__pendingInit = startApp;
});
</script>
</body>
